<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Chat</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14181d;
      --panel-2: #1b2026;
      --border: #2a313a;
      --text: #e6e9ef;
      --muted: #8a94a3;
      --accent: #7aa2f7;
      --agent: #1f2937;
      --user: #1e3a5f;
      --danger: #f7768e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f6f8;
        --panel: #ffffff;
        --panel-2: #f0f2f5;
        --border: #d8dce3;
        --text: #1a1d22;
        --muted: #5c6470;
        --accent: #3b5db8;
        --agent: #eef1f6;
        --user: #d9e7ff;
        --danger: #c2344a;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px; line-height: 1.5;
    }
    .app {
      display: flex; flex-direction: column;
      height: 100vh; max-width: 760px; margin: 0 auto;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .title { flex: 1; font-weight: 600; font-size: 16px; }
    .status {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s;
    }
    .dot.live { background: #2ecc71; }
    .dot.dead { background: var(--danger); }

    main {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg {
      max-width: 85%; padding: 10px 14px;
      border-radius: 12px; white-space: pre-wrap; word-wrap: break-word;
      font-size: 14px; line-height: 1.45;
    }
    .msg.user {
      align-self: flex-end; background: var(--user);
      border-bottom-right-radius: 4px;
    }
    .msg.agent {
      align-self: flex-start; background: var(--agent);
      border-bottom-left-radius: 4px;
    }
    .msg .ts {
      font-size: 11px; color: var(--muted); margin-top: 4px;
    }
    .typing {
      align-self: flex-start; color: var(--muted);
      font-style: italic; font-size: 13px; padding: 6px 14px;
    }
    .empty {
      color: var(--muted); text-align: center; margin-top: 40px;
      font-size: 14px;
    }

    form {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid var(--border); background: var(--panel);
    }
    textarea {
      flex: 1; resize: none; border: 1px solid var(--border);
      background: var(--panel-2); color: var(--text);
      padding: 10px 12px; border-radius: 10px;
      font: inherit; outline: none; max-height: 140px;
    }
    textarea:focus { border-color: var(--accent); }
    button {
      background: var(--accent); color: white;
      border: none; border-radius: 10px; padding: 0 16px;
      font: inherit; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.88; }

    .toast {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: var(--danger); color: white;
      padding: 8px 14px; border-radius: 8px; font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title" id="agent-name">Agent</div>
      <div class="status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">connecting…</span>
      </div>
    </header>
    <main id="messages">
      <div class="empty">Say hi to start the conversation.</div>
    </main>
    <form id="send-form">
      <textarea id="input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    (function () {
      const qs = new URLSearchParams(location.search);
      const token = qs.get("token") || "";
      const authHeader = token ? { Authorization: "Bearer " + token } : {};

      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const formEl = document.getElementById("send-form");
      const sendBtn = document.getElementById("send-btn");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const agentNameEl = document.getElementById("agent-name");
      const toastEl = document.getElementById("toast");

      const seenIds = new Set();
      let typingEl = null;

      function showToast(text, ms = 3000) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
        setTimeout(() => toastEl.classList.remove("show"), ms);
      }

      function fmtTime(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        } catch { return ""; }
      }

      function removeEmpty() {
        const empty = messagesEl.querySelector(".empty");
        if (empty) empty.remove();
      }

      function addMessage(msg) {
        if (!msg || !msg.id || seenIds.has(msg.id)) return;
        seenIds.add(msg.id);
        removeEmpty();
        removeTyping();

        const el = document.createElement("div");
        el.className = "msg " + (msg.role === "user" ? "user" : "agent");
        el.textContent = msg.content;
        const ts = document.createElement("div");
        ts.className = "ts";
        ts.textContent = fmtTime(msg.ts);
        el.appendChild(ts);
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function showTyping() {
        if (typingEl) return;
        typingEl = document.createElement("div");
        typingEl.className = "typing";
        typingEl.textContent = "…thinking";
        messagesEl.appendChild(typingEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function removeTyping() {
        if (typingEl) {
          typingEl.remove();
          typingEl = null;
        }
      }

      function setStatus(state, text) {
        statusDot.className = "dot " + state;
        statusText.textContent = text;
      }

      async function loadStatus() {
        try {
          const res = await fetch("/v1/status", { headers: authHeader });
          if (res.status === 401) {
            setStatus("dead", "auth required — add ?token=... to URL");
            return;
          }
          if (res.ok) {
            const data = await res.json();
            const identity = (data.agent?.identity || "").match(/Name:\s*([^\n]+)/);
            if (identity) agentNameEl.textContent = identity[1].trim();
          }
        } catch {}
      }

      async function loadHistory() {
        try {
          const res = await fetch("/v1/chat/history?limit=50", { headers: authHeader });
          if (!res.ok) return;
          const data = await res.json();
          for (const msg of data.entries || []) addMessage(msg);
        } catch {}
      }

      function connectSse() {
        const url = "/v1/chat/stream" + (token ? "?token=" + encodeURIComponent(token) : "");
        const es = new EventSource(url);

        es.addEventListener("hello", () => {
          setStatus("live", "connected");
        });
        es.addEventListener("message", (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.role === "user") {
              // echo of our own send — already rendered optimistically
              return;
            }
            addMessage(msg);
          } catch {}
        });
        es.onerror = () => {
          setStatus("dead", "reconnecting…");
          es.close();
          setTimeout(connectSse, 2000);
        };
      }

      async function send() {
        const content = inputEl.value.trim();
        if (!content) return;

        // Optimistic render
        const optimistic = {
          id: "local_" + Date.now(),
          ts: new Date().toISOString(),
          role: "user",
          content,
        };
        addMessage(optimistic);
        inputEl.value = "";
        inputEl.style.height = "auto";
        sendBtn.disabled = true;
        showTyping();

        try {
          const res = await fetch("/v1/chat/send", {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeader },
            body: JSON.stringify({ message: content }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ error: "Send failed" }));
            showToast(err.error || "Send failed");
            removeTyping();
          }
        } catch (e) {
          showToast("Network error");
          removeTyping();
        } finally {
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      // Auto-grow textarea
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
      });

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      formEl.addEventListener("submit", (e) => {
        e.preventDefault();
        send();
      });

      loadStatus();
      loadHistory();
      connectSse();
    })();
  </script>
</body>
</html>
